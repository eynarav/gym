<!doctype html>
<html lang="ru" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#F2F3F5">
<title>Дневник тренировок</title>
<style>
:root, [data-theme="light"]{
  --bg:#F2F3F5; --surface:#FFFFFF; --surface-2:#EAECF0; --line:#D7DBE0;
  --text:#1A1D21; --text-dim:#5C636E; --text-ghost:#6E7682; --ink:#2C313A; --muted:#B9C0C9;
  --accent:#FF5A1F; --accent-press:#E04A12; --accent-soft:rgba(255,90,31,.13);
  --danger:#C42B1C; --shadow:0 1px 2px rgba(20,22,26,.06),0 2px 8px rgba(20,22,26,.05);
}
[data-theme="dark"]{
  --bg:#14161A; --surface:#1C1F25; --surface-2:#23272E; --line:#2E333B;
  --text:#ECEEF1; --text-dim:#A2A9B4; --text-ghost:#828A96; --ink:#C7CDD6; --muted:#525a66;
  --accent:#FF6A33; --accent-press:#FF7E4D; --accent-soft:rgba(255,106,51,.17);
  --danger:#FF6B6B; --shadow:0 1px 2px rgba(0,0,0,.3),0 2px 10px rgba(0,0,0,.25);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background:var(--bg); color:var(--text);
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  font-size:16px; line-height:1.4; -webkit-font-smoothing:antialiased;
}
.mono{font-family:ui-monospace,"SF Mono","Roboto Mono",Menlo,Consolas,monospace;font-variant-numeric:tabular-nums}
.hidden{display:none!important}
button{font-family:inherit}
input,textarea,select{font-family:inherit}

#app{display:flex;flex-direction:column;height:100dvh;min-height:100vh;max-width:560px;margin:0 auto;background:var(--bg);border-left:1px solid var(--line);border-right:1px solid var(--line)}

#topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:6px;
  min-height:54px;padding:env(safe-area-inset-top) 8px 0;background:var(--bg);border-bottom:1px solid var(--line)}
#topbar .tb-title{font-weight:700;font-size:19px;letter-spacing:-.01em;padding:0 6px}
#topbar .brand-dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--accent);margin-right:9px;vertical-align:middle}
.tb-back{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;color:var(--text);border-radius:10px}
.tb-back:active{background:var(--surface-2)}

#view{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px calc(20px + env(safe-area-inset-bottom))}
#view.with-footer{padding-bottom:0}
.section-pad{padding-bottom:84px}

#tabbar{display:grid;grid-template-columns:repeat(4,1fr);background:var(--surface);border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}
#tabbar button{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 0 9px;border:none;background:transparent;color:var(--text-dim);font-size:11px;font-weight:600}
#tabbar button svg{width:23px;height:23px}
#tabbar button.active{color:var(--accent)}

.banner{display:flex;gap:9px;align-items:flex-start;background:var(--accent-soft);border:1px solid var(--accent);color:var(--text);border-radius:12px;padding:11px 12px;margin-bottom:14px;font-size:13px;line-height:1.45}
.banner svg{width:18px;height:18px;color:var(--accent);flex:none;margin-top:1px}

.card{background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow)}
.day-card{display:flex;align-items:center;gap:10px;padding:14px 12px 14px 16px;margin-bottom:10px;cursor:pointer}
.day-card .dc-main{flex:1;min-width:0}
.day-card .dc-name{font-weight:650;font-size:17px;letter-spacing:-.01em}
.day-card .dc-sub{font-size:13px;color:var(--text-dim);margin-top:2px}
.day-card .dc-sub.mono{font-size:12.5px}

.list-item{display:flex;align-items:center;gap:12px;padding:13px 14px;margin-bottom:8px;cursor:pointer}
.li-date{flex:1;min-width:0}
.li-d1{font-weight:600;font-size:15px}
.li-d2{font-size:12.5px;color:var(--text-dim);margin-top:2px}
.li-vol{text-align:right;color:var(--text-dim);font-size:12.5px}
.li-vol b{display:block;color:var(--text);font-size:15px}
.chev{color:var(--text-ghost)}

.sec-title{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-dim);margin:22px 4px 10px}
.sec-title:first-child{margin-top:4px}

.btn{height:48px;border-radius:12px;font-size:16px;font-weight:650;display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:0 16px;border:1px solid transparent;background:var(--surface-2);color:var(--text);transition:transform .04s,background .15s}
.btn svg{width:20px;height:20px}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:active{background:var(--accent-press)}
.btn-ghost{background:transparent;border-color:var(--line);color:var(--text)}
.btn-ghost:active{background:var(--surface-2)}
.btn-block{width:100%}
.btn-sm{height:42px;font-size:14.5px;border-radius:11px;padding:0 12px;gap:6px}
.btn-sm svg{width:18px;height:18px}
.danger-btn{color:var(--danger)}
.icon-btn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:10px;border:none;background:transparent;color:var(--text-dim)}
.icon-btn svg{width:20px;height:20px}
.icon-btn:active{background:var(--surface-2)}
.icon-btn.danger{color:var(--danger)}
.add-row{width:100%;height:42px;border:1px dashed var(--line);border-radius:11px;background:transparent;color:var(--text-dim);font-size:14.5px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:4px}
.add-row svg{width:18px;height:18px}
.add-row:active{background:var(--surface-2)}

.fin{width:100%;height:46px;border:1px solid var(--line);border-radius:11px;background:var(--surface-2);color:var(--text);font-size:16px;padding:0 12px;outline:none}
.fin:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
textarea.fin{height:auto;min-height:46px;padding:11px 12px;resize:vertical;line-height:1.4}
.field-label{font-size:12.5px;font-weight:600;color:var(--text-dim);margin:0 2px 6px}
.field{margin-bottom:14px}
select.fin{appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='20' height='20' viewBox='0 0 24 24' fill='none' stroke='%235C636E' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M6 9l6 6 6-6'/></svg>");background-repeat:no-repeat;background-position:right 10px center;padding-right:38px}

.ex-card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:12px 12px 10px;margin-bottom:12px;box-shadow:var(--shadow)}
.ex-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.name-in{flex:1;height:46px;border:1px solid var(--line);border-radius:11px;background:var(--surface-2);color:var(--text);font-size:16.5px;font-weight:600;padding:0 12px;outline:none}
.name-in:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.set-row{padding:6px 0}
.set-main{display:grid;grid-template-columns:24px 1fr 20px 1fr 34px;gap:8px;align-items:center}
.si{font-family:ui-monospace,monospace;font-size:13px;color:var(--text-dim);text-align:center;font-variant-numeric:tabular-nums}
.num-wrap{position:relative}
.num-wrap .unit{position:absolute;right:11px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--text-dim);pointer-events:none}
.sin{width:100%;height:46px;border:1px solid var(--line);border-radius:11px;background:var(--surface-2);color:var(--text);font-size:16px;text-align:center;outline:none;font-family:ui-monospace,"Roboto Mono",monospace;font-variant-numeric:tabular-nums}
.num-wrap .sin{padding-right:26px;text-align:right;padding-left:10px}
.sin:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.xsign{text-align:center;color:var(--text-dim);font-family:ui-monospace,monospace}
.set-sub{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:5px;padding-left:32px;min-height:16px}
.ghost{font-family:ui-monospace,"Roboto Mono",monospace;font-size:12px;color:var(--text-ghost);font-variant-numeric:tabular-nums}
.pr-badge{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--accent);background:var(--accent-soft);padding:2px 7px;border-radius:999px}
.pr-badge svg{width:11px;height:11px}
.ex-note{margin-top:8px}
.ex-note input{width:100%;height:40px;border:none;border-top:1px solid var(--line);background:transparent;color:var(--text);font-size:14px;padding:8px 2px 2px;outline:none}
.ex-note input::placeholder{color:var(--text-ghost)}

.editor-footer{position:sticky;bottom:0;display:flex;align-items:center;gap:10px;padding:10px 12px calc(10px + env(safe-area-inset-bottom));background:var(--surface);border-top:1px solid var(--line);margin:0 -14px}
.vol{display:flex;flex-direction:column;line-height:1.1;margin-right:2px;min-width:74px}
.vol-l{font-size:11px;color:var(--text-dim);font-weight:600}
.vol-v{font-family:ui-monospace,"Roboto Mono",monospace;font-weight:700;font-size:17px;font-variant-numeric:tabular-nums;margin-top:2px}
.btn-rest{padding:0 12px}

.det-meta{color:var(--text-dim);font-size:14px;margin:2px 2px 14px}
.det-note{background:var(--surface-2);border-radius:11px;padding:10px 12px;font-size:14.5px;margin-bottom:14px;white-space:pre-wrap}
.det-ex{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:10px;box-shadow:var(--shadow)}
.det-ex-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
.det-ex h4{margin:0;font-size:16px;font-weight:650;flex:1;min-width:0}
.det-set{display:flex;align-items:center;gap:10px;font-family:ui-monospace,"Roboto Mono",monospace;font-size:14.5px;padding:3px 0;font-variant-numeric:tabular-nums}
.det-set .dn{color:var(--text-dim);width:18px}
.det-set .dv{flex:1}
.det-exnote{font-size:13px;color:var(--text-dim);margin-top:7px;padding-top:7px;border-top:1px solid var(--line)}
.det-total{display:flex;justify-content:space-between;font-size:13.5px;color:var(--text-dim);margin-top:9px;padding-top:9px;border-top:1px solid var(--line)}
.det-total b{color:var(--text);font-family:ui-monospace,monospace}
.detail-actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:16px}

.seg{display:flex;background:var(--surface-2);border-radius:11px;padding:3px;margin-bottom:14px}
.seg button{flex:1;min-width:0;height:38px;border:none;background:transparent;color:var(--text-dim);font-size:14px;font-weight:600;border-radius:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 6px}
.seg button.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}

.chart-wrap{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px 10px 8px;box-shadow:var(--shadow);margin-bottom:12px}
.chart-stats{display:flex;gap:18px;padding:0 6px 10px;flex-wrap:wrap}
.cstat{font-size:12.5px;color:var(--text-dim)}
.cstat b{display:block;font-size:18px;color:var(--text);font-family:ui-monospace,monospace;font-weight:700;margin-top:1px}
svg.chart{display:block;width:100%;height:auto}

.mini-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 14px;margin-bottom:7px}
.mini-item .mi-d{font-size:13.5px;color:var(--text-dim)}
.mini-item .mi-v{font-family:ui-monospace,"Roboto Mono",monospace;font-size:14.5px;font-variant-numeric:tabular-nums}
.flame{color:var(--accent);display:inline-flex;vertical-align:-1px}

.empty{padding:54px 26px;text-align:center;color:var(--text-dim)}
.empty svg{width:44px;height:44px;margin-bottom:14px;color:var(--text-ghost)}
.empty p{margin:0;font-size:14.5px;line-height:1.5}

.overlay{position:fixed;inset:0;z-index:60;background:rgba(10,12,16,.5);display:flex;align-items:flex-end;justify-content:center}
.sheet{background:var(--surface);width:100%;max-width:560px;border-radius:18px 18px 0 0;padding:18px 18px calc(18px + env(safe-area-inset-bottom));box-shadow:0 -8px 30px rgba(0,0,0,.25);animation:slideUp .18s ease}
@keyframes slideUp{from{transform:translateY(20px);opacity:.6}to{transform:none;opacity:1}}
.sheet h3{margin:0 0 6px;font-size:18px;font-weight:700}
.sheet p{margin:0 0 14px;color:var(--text-dim);font-size:14.5px;line-height:1.45}
.sheet-actions{display:flex;flex-direction:column;gap:9px;margin-top:6px}

.timer-overlay{position:fixed;inset:0;z-index:70;background:rgba(10,12,16,.9);display:flex;align-items:center;justify-content:center}
.timer-box{text-align:center;color:#fff;width:100%;max-width:420px;padding:24px}
.timer-time{font-family:ui-monospace,"Roboto Mono",monospace;font-size:84px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:.02em;line-height:1}
.timer-time.done{color:var(--accent)}
.timer-label{color:rgba(255,255,255,.6);font-size:14px;margin-top:8px;min-height:18px}
.timer-row{display:flex;gap:10px;justify-content:center;margin-top:28px}
.timer-row .btn{background:rgba(255,255,255,.13);color:#fff;border:none}
.timer-row .btn.primary{background:var(--accent)}
.timer-note{color:rgba(255,255,255,.45);font-size:12px;margin-top:16px}
.timer-close{margin-top:10px;background:none;border:none;color:rgba(255,255,255,.55);font-size:15px;padding:10px}

.toast{position:fixed;left:50%;bottom:calc(80px + env(safe-area-inset-bottom));transform:translate(-50%,0);background:var(--text);color:var(--bg);padding:11px 18px;border-radius:11px;font-size:14px;font-weight:600;z-index:90;box-shadow:0 6px 20px rgba(0,0,0,.3);max-width:90%;text-align:center}
.toast.show{animation:toastIn .2s ease}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,8px)}to{opacity:1;transform:translate(-50%,0)}}

:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
.ex-bar{display:flex;align-items:center;gap:8px;cursor:pointer;min-height:30px}
.ex-bar.open{cursor:default;margin-bottom:2px}
.exchev{flex:none;width:30px;height:30px;display:flex;align-items:center;justify-content:center;color:var(--text-dim);border:none;background:transparent;border-radius:8px;transition:transform .16s}
.exchev svg{width:20px;height:20px}
.exchev.open{transform:rotate(90deg);color:var(--accent)}
.ex-bar:active .exchev{color:var(--accent)}
.ex-title{flex:1;min-width:0}
.ex-tn{font-size:16.5px;font-weight:650;letter-spacing:-.01em;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ex-tn.ph{color:var(--text-ghost);font-weight:500}
.ex-ts{font-size:12px;color:var(--text-dim);font-weight:600;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ex-ts.mono{font-family:ui-monospace,"Roboto Mono",monospace;letter-spacing:0}
.ex-hint{font-size:12px;color:var(--text-dim);font-weight:600;margin:2px 2px 10px}
.ex-card.collapsed{padding:11px 12px}
.day-card{display:block;padding:14px 14px 13px;cursor:default}
.dc-top{display:flex;align-items:center;gap:8px;margin-bottom:11px}
.set-main.one{grid-template-columns:24px 1fr 34px}
.hbtn{flex:none;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border:1px solid var(--line);background:var(--surface-2);color:var(--accent);border-radius:9px}
.hbtn svg{width:17px;height:17px}
.hbtn:active{background:var(--line)}
.sheet{max-height:88vh;overflow-y:auto}
.grip-x{width:38px;height:4px;border-radius:2px;background:var(--line);margin:0 auto 12px}
.ht-sub{color:var(--text-dim);font-size:13px;margin-bottom:14px}
.illo{background:var(--surface-2);border:1px solid var(--line);border-radius:14px;padding:10px;margin-bottom:8px}
.illo svg{display:block;width:100%;height:auto}
.illo-cap{text-align:center;font-size:12px;color:var(--text-dim);margin:6px 4px 0}
.ht-params{display:flex;flex-wrap:wrap;gap:7px;margin:2px 0 4px}
.chip2{font-size:12px;font-weight:600;color:var(--text-dim);background:var(--surface-2);border-radius:999px;padding:3px 10px}
.ht-h{font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--text-dim);margin:18px 0 8px}
.ht-h.safe{color:var(--accent)}
ol.ht-steps{margin:0;padding-left:0;list-style:none;counter-reset:s}
ol.ht-steps li{position:relative;padding:0 0 10px 32px;counter-increment:s;font-size:14.5px;line-height:1.5}
ol.ht-steps li::before{content:counter(s);position:absolute;left:0;top:0;width:24px;height:24px;border-radius:50%;background:var(--surface-2);color:var(--text);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:ui-monospace,monospace}
ul.ht-cues{margin:0;padding:0;list-style:none}
ul.ht-cues li{position:relative;padding:0 0 9px 22px;font-size:14px;line-height:1.5}
ul.ht-cues li::before{content:"";position:absolute;left:3px;top:8px;width:7px;height:7px;border-radius:50%;background:var(--accent)}
.ht-note{font-size:13px;color:var(--text-dim);background:var(--surface-2);border-radius:10px;padding:10px 12px;margin-top:14px;line-height:1.45}
.rir{display:flex;align-items:center;gap:8px;margin-top:11px;padding-top:11px;border-top:1px solid var(--line)}
.rir .rl{font-size:13px;font-weight:600;color:var(--text-dim);display:flex;align-items:center;gap:6px}
.rq{width:18px;height:18px;border-radius:50%;border:1px solid var(--line);background:transparent;color:var(--text-dim);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0;line-height:1}
.rir-seg{display:flex;gap:5px;margin-left:auto}
.rir-seg button{min-width:40px;height:34px;border:1px solid var(--line);background:var(--surface-2);color:var(--text-dim);border-radius:9px;font-size:14px;font-weight:700;font-family:ui-monospace,monospace}
.rir-seg button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.deload-row{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:14px;box-shadow:var(--shadow)}
.dl-l{font-size:14.5px;font-weight:600;display:flex;align-items:center;gap:7px}
.switch{position:relative;display:inline-block;width:46px;height:28px;flex:none}
.switch input{opacity:0;width:0;height:0}
.sl{position:absolute;inset:0;background:var(--surface-2);border:1px solid var(--line);border-radius:999px;transition:.15s;cursor:pointer}
.sl::before{content:"";position:absolute;width:20px;height:20px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.15s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.switch input:checked + .sl{background:var(--accent);border-color:var(--accent)}
.switch input:checked + .sl::before{transform:translateX(18px)}
.tag-deload{display:inline-block;font-size:11px;font-weight:700;color:var(--accent);background:var(--accent-soft);border-radius:999px;padding:2px 8px;margin-left:8px;vertical-align:middle}
.phase{display:flex;gap:10px;align-items:flex-start;background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:12px;padding:11px 13px;margin-bottom:16px;box-shadow:var(--shadow)}
.phase .pi{flex:none;width:20px;height:20px;color:var(--accent);margin-top:1px}
.phase b{font-weight:700;font-size:15px}
.phase .ph-sub{font-size:12.5px;color:var(--text-dim);margin-top:2px;line-height:1.45}
.ph-link{border:none;background:transparent;color:var(--accent);font-weight:600;font-size:12.5px;padding:0;text-decoration:underline}
.ex-timer-link{border:none;background:transparent;color:var(--accent);font-weight:700;font-size:12px;padding:0;text-decoration:underline;margin-left:2px}
.ex-type-row{display:flex;align-items:center;gap:8px;margin:2px 2px 11px}
.etl{font-size:12px;font-weight:600;color:var(--text-dim)}
.etseg{display:flex;gap:5px;margin-left:auto}
.etseg button{height:30px;padding:0 10px;border:1px solid var(--line);background:var(--surface-2);color:var(--text-dim);border-radius:9px;font-size:12px;font-weight:600}
.etseg button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.prog-hint{display:flex;align-items:center;gap:7px;background:var(--accent-soft);color:var(--text);border-radius:9px;padding:7px 10px;margin:2px 2px 11px;font-size:12px;font-weight:600;line-height:1.35}
.prog-hint svg{width:15px;height:15px;color:var(--accent);flex:none}
.tpl-arrows{display:flex;gap:2px;flex:none}
.icon-btn:disabled{opacity:.28;pointer-events:none}
.backup-nudge{font-size:12.5px;color:var(--text-dim);margin-bottom:2px}
.backup-nudge.warn{color:var(--accent);font-weight:600}
.ht-brief{font-size:14px;line-height:1.5;color:var(--text);background:var(--surface-2);border-radius:10px;padding:10px 12px;margin:2px 0 4px}
.ht-brief b{color:var(--accent);font-weight:700}
.sym-nudge{display:flex;gap:10px;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:16px;box-shadow:var(--shadow);font-size:14px}
</style>

const HOWTO={
  "жим ногами в тренажере":{illo:ILLO_LEGPRESS,brief:"Сел, прижался спиной, согнул колени к себе, мощно разогнул — без щелчка в конце.",
    steps:["Сядь, прижми поясницу и таз к спинке, плечи расслаблены.","Поставь стопы на платформу на ширине таза, носки чуть наружу.","Плавно согни колени, опуская платформу за 2–3 секунды — примерно до угла 90°.","Мощно выжми платформу, не выпрямляя колени «в замок»."],
    cues:["Поясница и таз прижаты всю амплитуду — разгружаются спина и шея.","Колени двигаются по линии стоп, не заваливаются внутрь.","Не «складывайся» глубоко внизу: таз не должен отрываться от спинки.","Без рывка и «отбива» внизу — опускание подконтрольное."]},
  "планка":{illo:ILLO_PLANK,brief:"Упор на предплечья, тело — прямая линия, живот и ягодицы напряжены.",
    steps:["Упор на предплечья, локти строго под плечами.","Вытяни тело в одну прямую линию от макушки до пяток.","Напряги пресс и ягодицы: таз не проваливай и не задирай.","Дыши ровно и держи отведённое время."],
    cues:["Шея — продолжение спины: не задирай и не роняй голову.","Поясница не провисает — за это отвечает напряжённый пресс.","Начались дрожь и провал техники — заверши подход.","Лучше меньше времени с прямой спиной, чем дольше с провисанием."]},
  "сгибание ног лежа/сидя":{illo:ILLO_LEGCURL,brief:"Лёг животом на скамью, подтянул пятки к ягодицам, медленно опустил обратно.",
    steps:["Зафиксируй бёдра; валик ложится чуть выше пятки, на ахилл.","Подтяни пятки к ягодицам, сгибая колени.","Опускай медленно, за 2–3 секунды, не бросая вес.","В нижней точке не выпрямляй колено в «замок»."],
    cues:["Двигаются только голени — таз и корпус прижаты.","Без рывка поясницей и без раскачки.","Опускание медленнее подъёма — бережём сухожилия.","Амплитуда комфортная, без боли под коленом."]},
  "жим от груди в тренажере":{illo:ILLO_CHESTPRESS,brief:"Сел, прижался спиной, выжал рукояти вперёд, вернул плавно — без рывка в локтях.",
    steps:["Сядь, прижми спину к спинке; рукояти — на уровне середины груди.","Выжимай рукояти вперёд плавно, не до «замка» в локтях.","Возвращай подконтрольно за 2–3 секунды.","Локти держи чуть ниже плеч, не разводи их до боли."],
    cues:["Спина и затылок в опоре — шею не вытягивай вперёд.","Плечи опущены, не тяни их к ушам.","Без рывка и щелчка в локтях вверху.","Давит в плечо — уменьши амплитуду или вес."]},
  "тяга верхнего блока к груди":{illo:ILLO_LATPULL,brief:"Взялся за рукоять, потянул к верху груди, локти вниз, вернул с растяжением.",
    steps:["Возьми нейтральную рукоять (при желании — лямки), зафиксируй бёдра под валиком.","Чуть отклони корпус назад и опусти плечи.","Тяни рукоять к верху груди, ведя локти вниз и назад.","Плавно верни вверх до лёгкого растяжения, контролируя вес."],
    cues:["Тяни спиной, а не руками — локти вниз, лопатки «в карманы».","Лямки снимают нагрузку с предплечий — бережём локоть.","Не дёргай корпусом и не заводи рукоять за голову.","Грудь приподнята, поясница нейтральна."]},
  "махи гантелями в стороны":{illo:ILLO_LATRAISE,brief:"Встал прямо, поднял руки через стороны до уровня плеч, опустил медленно.",
    steps:["Встань ровно, гантели у бёдер, локти чуть согнуты.","Поднимай руки через стороны до уровня плеч.","Веди локтями; мизинцы чуть выше больших пальцев.","Опускай медленно, за 2–3 секунды, не бросая вес."],
    cues:["Плечи опущены, не тяни их к ушам.","Без рывка и заброса корпусом — работают дельты.","Не поднимай выше плеч, чтобы не зажимать сустав.","Вес такой, чтобы техника не ломалась."]},
  "мертвый жук":{illo:ILLO_DEADBUG,brief:"Лёг на спину, поясница прижата, по очереди опускал противоположные руку и ногу.",
    steps:["Ляг на спину, руки вверх, колени согнуты под 90°.","Прижми поясницу к полу и держи так весь подход.","Медленно опусти одну руку за голову и противоположную ногу.","Вернись в исходное и поменяй сторону."],
    cues:["Поясница всё время прижата — не выгибай её.","Двигайся медленно и подконтрольно.","Не задерживай дыхание — выдох на опускании.","Поясница отрывается — уменьши амплитуду."]},
  "подъем на носки":{illo:ILLO_CALF,brief:"Встал на край ступеньки, поднялся на носки, задержался, медленно опустил пятки.",
    steps:["Встань носками на возвышение, пятки свободны.","Поднимись как можно выше на носки.","Задержись вверху на 1 секунду.","Медленно опусти пятки ниже площадки — лёгкое растяжение."],
    cues:["Работай через полную амплитуду, без мелких «дёрганий».","Контролируй спуск — не падай вниз.","Колени почти прямые, но не в «замке».","Держись за опору для равновесия."]},
  "втягивание подбородка (chin tuck)":{illo:ILLO_CHINTUCK,brief:"Подал подбородок назад, будто делаешь «второй подбородок», удержал 2–3 секунды.",
    steps:["Сядь или встань прямо, взгляд перед собой.","Мягко подай подбородок назад — не наклоняя голову вниз и не запрокидывая.","Ты должен почувствовать лёгкое растяжение у основания черепа и увидеть «второй подбородок».","Удержи 2–3 секунды и плавно вернись в обычное положение."],
    cues:["Движение мягкое и небольшое — не силовое, без рывка.","Плечи и грудная клетка неподвижны, работает только шея.","Это упражнение для осанки — можно делать несколько раз в течение дня.","Появилась боль или головокружение — остановись."]},
  "разведения с резиной (band pull-apart)":{illo:ILLO_BANDPULL,brief:"Взял резину на ширине плеч, развёл руки в стороны, сводя лопатки, вернул медленно.",
    steps:["Возьми резину прямыми руками на ширине плеч перед собой.","Разводи руки в стороны, сводя лопатки друг к другу.","В конце — короткая пауза, лопатки сведены.","Плавно верни руки обратно, не теряя натяжение резины."],
    cues:["Руки остаются прямыми, движение идёт от лопаток, а не от кистей.","Плечи опущены, не тяни их к ушам.","Без рывков — резина должна быть натянута всё время.","Лёгкое сопротивление — это разминка, не силовая работа."]},
  "приседания без веса":{illo:ILLO_BWSQUAT,brief:"Встал прямо, присел, отводя таз назад, руки вперёд для баланса, встал через пятки.",
    steps:["Встань чуть шире плеч, носки слегка наружу.","Присядь, отводя таз назад, руки вынеси вперёд для баланса.","Опустись до комфортной глубины — без боли в коленях.","Встань, отталкиваясь через пятки."],
    cues:["Это разминка — амплитуда произвольная, комфортная.","Колени смотрят туда же, куда носки.","Пятки не отрываются от пола.","Темп спокойный, без рывков."]},
  "вращения запястьями":{illo:ILLO_WRISTROT,brief:"Вращай кистью по кругу в одну сторону, затем в другую — мягкий разогрев.",
    steps:["Вытяни руку перед собой или опусти вдоль тела.","Вращай кистью по кругу — сначала в одну сторону, затем в другую.","Держи движение мягким и медленным.","Повтори на второй руке."],
    cues:["Это разминка перед нагрузкой на локоть — не через боль.","Амплитуда небольшая, без силы.","Если чувствуешь острую боль — остановись и пропусти.","Хорошо сочетается с разгибаниями запястья ниже."]},
  "изометрия разгибателей запястья":{illo:ILLO_ISOWRIST,brief:"Предплечье на столе, кисть разогнута вверх, удержи с лёгким сопротивлением.",
    steps:["Положи предплечье на стол, кисть свободно свисает с края.","Разогни кисть вверх (тыльная сторона идёт вверх).","Второй рукой создай лёгкое сопротивление сверху, не давая кисти опуститься.","Удержи 30–45 секунд, дыши ровно."],
    cues:["Это про фазу обострения — сопротивление лёгкое, не через боль.","На тренировках дополнительно надевай налокотник.","Допустима боль до 3–4 из 10 во время и сразу после.","Боль нарастает на следующий день — снижай нагрузку."]},

function howto(i){ const e=draft&&draft.exercises[i]; if(!e) return; openSheet(howtoHTML(e)); }
function howtoHTML(e){
  const ty=exType(e), hd=HOWTO[norm(e.name)];
  const tl=ty==="time"?"на время (секунды)":ty==="reps"?"повторы":"вес × повторы";
  let s='<div class="grip-x"></div><h3>'+esc(e.name||"Упражнение")+'</h3><div class="ht-sub">Тип: '+tl+'</div>';
  if(hd&&hd.illo) s+='<div class="illo">'+hd.illo+'</div>';
  if(hd&&hd.brief) s+='<div class="ht-brief"><b>Коротко:</b> '+esc(hd.brief)+'</div>';
  if(e.target||e.rest) s+='<div class="ht-params"><span class="chip2">Цель: '+esc(e.target||"—")+'</span>'+(e.rest?'<span class="chip2">Отдых: '+e.rest+' с</span>':'')+'</div>';
  if(hd&&hd.steps) s+='<div class="ht-h">Как делать</div><ol class="ht-steps">'+hd.steps.map(x=>'<li>'+esc(x)+'</li>').join("")+'</ol>';
  if(hd&&hd.cues) s+='<div class="ht-h safe">Важно для безопасности</div><ul class="ht-cues">'+hd.cues.map(x=>'<li>'+esc(x)+'</li>').join("")+'</ul>';
  if(e.note) s+='<div class="ht-note">'+esc(e.note)+'</div>';
  if(!hd) s+='<div class="ht-note">Подробное описание и схема для этого упражнения появятся в следующих обновлениях.</div>';
  s+='<button class="btn btn-ghost btn-block" style="margin-top:16px" onclick="App.closeSheet()">Закрыть</button>';
  return s;
}
const TPL_KINDS=["A","B","C","warmup","elbow","neck"];
function cloneDefaultTpl(){ const o={}; TPL_KINDS.forEach(function(k){ o[k]=(DEFAULT_TPL[k]||[]).map(function(t){ return Object.assign({},t); }); }); return o; }
function defaults(){
  return {
    version:VERSION,
    days:[{id:gid(),name:"День A",kind:"A"},{id:gid(),name:"День B",kind:"B"},{id:gid(),name:"День C",kind:"C"}],
    workouts:[], bodyweight:[], symptoms:[], dayTemplates:cloneDefaultTpl(), settings:{theme:"auto",rest:90,blockStart:null,lastBackupAt:null,tplRenameHintShown:false,onboardShown:false}
  };
}
function sanitizeTplEntry(t){
  if(!t||typeof t!=="object") return null;
  const nm=String(t.name||"").trim(); if(!nm) return null;
  const ty=(t.type==="time"||t.type==="reps")?t.type:"wr";
  const restN=Number(t.rest);
  return {name:nm, type:ty, target:String(t.target||""), rest:(restN>0&&restN<=1200)?Math.round(restN):0, note:String(t.note||"")};
}
/* migrate + normalize any loaded/imported object into a safe, current-shape state */
function normalizeState(d){
  if(!d || typeof d!=="object") return defaults();
  let v = typeof d.version==="number" ? d.version : 1;
  // (future migrations switch on v here)
  const out = {version:VERSION, days:[], workouts:[], bodyweight:[], symptoms:[], dayTemplates:{}, settings:{theme:"auto",rest:90,blockStart:null,lastBackupAt:null,tplRenameHintShown:false,onboardShown:false}};
  if(Array.isArray(d.days)) out.days = d.days.filter(x=>x&&x.id).map(x=>({id:String(x.id),name:String(x.name||"День"),kind:(x.kind==="A"||x.kind==="B"||x.kind==="C")?x.kind:inferKind(x.name)}));
  if(!out.days.length) out.days = defaults().days;
  if(Array.isArray(d.workouts)) out.workouts = d.workouts.filter(w=>w&&w.id&&Array.isArray(w.exercises)).map(w=>({
    id:String(w.id), templateId:String(w.templateId||""), templateName:String(w.templateName||""),
    date:isISO(w.date)?w.date:todayISO(), note:String(w.note||""), created:Number(w.created)||0, deload:!!w.deload, cardio:(w.cardio&&typeof w.cardio==="object")?{type:String(w.cardio.type||""),min:Math.round(num(w.cardio.min)),hr:Math.round(num(w.cardio.hr))}:null,
    exercises:w.exercises.map(e=>{ var ty=(e.type==="time"||e.type==="reps")?e.type:"wr"; return {
      id:String(e.id||gid()), name:String(e.name||""), note:String(e.note||""), type:ty, rir:(typeof e.rir==="number"?e.rir:null),
      sets:Array.isArray(e.sets)?e.sets.map(s=> ty==="time"?{sec:Math.round(num(s.sec))} : ty==="reps"?{reps:Math.round(num(s.reps))} : {weight:Number(num(s.weight)),reps:Math.round(num(s.reps))}):[]
    };})
  }));
  TPL_KINDS.forEach(function(k){
    const raw = (d.dayTemplates && typeof d.dayTemplates==="object") ? d.dayTemplates[k] : null;
    const loaded = Array.isArray(raw) ? raw.map(sanitizeTplEntry).filter(Boolean) : null;
    out.dayTemplates[k] = loaded!==null ? loaded : (DEFAULT_TPL[k]||[]).map(function(t){ return Object.assign({},t); });
  });
  if(Array.isArray(d.bodyweight)) out.bodyweight = d.bodyweight.filter(x=>x&&isISO(x.date)).map(x=>({date:x.date,weight:Number(num(x.weight)),waist:Number(num(x.waist))>0?Number(num(x.waist)):0}));
  if(Array.isArray(d.symptoms)) out.symptoms = d.symptoms.filter(x=>x&&isISO(x.date)).map(x=>({date:x.date,elbow:Math.max(0,Math.min(10,Math.round(num(x.elbow)))),neck:Math.max(0,Math.min(10,Math.round(num(x.neck))))}));
  if(d.settings&&typeof d.settings==="object"){
    const t=d.settings.theme; out.settings.theme=(t==="dark"||t==="light"||t==="auto")?t:"auto";
    const r=Number(d.settings.rest); out.settings.rest=(r>0&&r<=3600)?Math.round(r):90;
    if(isISO(d.settings.blockStart)) out.settings.blockStart=d.settings.blockStart;
    if(isISO(d.settings.lastBackupAt)) out.settings.lastBackupAt=d.settings.lastBackupAt;
    out.settings.tplRenameHintShown=!!d.settings.tplRenameHintShown;
    out.settings.onboardShown=!!d.settings.onboardShown;
  }
  return out;
}
function isValidImport(d){
  return d && typeof d==="object" && Array.isArray(d.days) && Array.isArray(d.workouts);
}

/* ---------- helpers ---------- */
function gid(){ return "id"+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function num(v){ if(v==null) return 0; const n=parseFloat(String(v).replace(",",".")); return isNaN(n)?0:n; }
function fmt(n){ n=Number(n); if(!isFinite(n)) return "0"; return Number.isInteger(n)?String(n):String(Math.round(n*100)/100).replace(".",","); }
function fmtEdit(n){ if(n===""||n==null) return ""; n=Number(n); if(isNaN(n)) return ""; return Number.isInteger(n)?String(n):String(Math.round(n*100)/100).replace(".",","); }
function fmtVol(n){ n=Number(n)||0; return n>0?(fmt(n)+" кг"):"—"; }
function norm(s){ return String(s==null?"":s).trim().toLowerCase().replace(/ё/g,"е"); }
function pad(n){ return n<10?"0"+n:""+n; }
function isISO(s){ return typeof s==="string" && /^\d{4}-\d{2}-\d{2}$/.test(s); }
function todayISO(){ const d=new Date(); return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
function daysSince(iso){ if(!isISO(iso)) return null; return Math.floor((parseISO(todayISO())-parseISO(iso))/86400000); }
function parseISO(iso){ if(!isISO(iso)) return new Date(); const p=iso.split("-"); const d=new Date(+p[0],+p[1]-1,+p[2]); return isNaN(d.getTime())?new Date():d; }
function addMonthsISO(iso,m){ const d=parseISO(iso); d.setMonth(d.getMonth()+m); return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
function fmtFull(iso){ const d=parseISO(iso); return d.getDate()+" "+MON[d.getMonth()]+" "+d.getFullYear(); }
function fmtWeekFull(iso){ const d=parseISO(iso); return WD[d.getDay()]+", "+d.getDate()+" "+MON[d.getMonth()]+" "+d.getFullYear(); }
function fmtShort(iso){ const d=parseISO(iso); return pad(d.getDate())+"."+pad(d.getMonth()+1); }
function fmtDMY(iso){ const d=parseISO(iso); return pad(d.getDate())+"."+pad(d.getMonth()+1)+"."+d.getFullYear(); }

/* ---------- derived ---------- */
function weeklyAvgWeight(bw){ if(!bw.length) return null; const lastT=parseISO(bw[bw.length-1].date).getTime(); const cutoff=lastT-6*86400000; const within=bw.filter(function(x){ return parseISO(x.date).getTime()>=cutoff; }); if(!within.length) return null; let sum=0; within.forEach(function(x){ sum+=num(x.weight); }); return sum/within.length; }
function dayName(id){ const d=state.days.find(x=>x.id===id); return d?d.name:""; }
function workoutVol(w){ let v=0; w.exercises.forEach(e=>e.sets.forEach(s=>{ v+=num(s.weight)*num(s.reps); })); return v; }
function setCount(w){ let c=0; w.exercises.forEach(e=>c+=e.sets.length); return c; }
function lastWorkout(tid){ let b=null; state.workouts.forEach(w=>{ if(w.templateId!==tid) return; if(!b||w.date>b.date||(w.date===b.date&&(w.created||0)>(b.created||0))) b=w; }); return b; }
function priorBest(name,beforeISO,excludeId){
  const nm=norm(name); let best=-Infinity;
  state.workouts.forEach(w=>{ if(w.id===excludeId) return; if(!(w.date<beforeISO)) return;
    w.exercises.forEach(e=>{ if(norm(e.name)!==nm) return; e.sets.forEach(s=>{ const x=num(s.weight); if(x>best) best=x; }); }); });
  return best;
}
function prevSession(tid,name,beforeISO,excludeId){
  const nm=norm(name); let cand=null;
  state.workouts.forEach(w=>{ if(w.id===excludeId) return; if(w.templateId!==tid) return; if(!(w.date<beforeISO)) return;
    if(!w.exercises.some(e=>norm(e.name)===nm)) return;
    if(!cand||w.date>cand.date||(w.date===cand.date&&(w.created||0)>(cand.created||0))) cand=w; });
  if(!cand) return null; const ex=cand.exercises.find(e=>norm(e.name)===nm); return ex?ex.sets:null;
}
/* Double-progression hint — deliberately narrow: only fires for "weight×reps" targets written as
   "NN" or "NN–NN" (audited: every wr-type exercise in this program's data uses exactly one of these
   two forms). Anything else (time, per-side, "N×reps" prescriptions) is left alone rather than guessed at. */
function parseWrTarget(target){
  if(!target) return null;
  const m=/^(\d+)(?:[–-](\d+))?$/.exec(String(target).trim());
  if(!m) return null;
  const lo=parseInt(m[1],10), hi=m[2]?parseInt(m[2],10):lo;
  return {lo:lo,hi:hi};
}
function progressionHint(tid,name,dateISO,excludeId,target){
  const rng=parseWrTarget(target); if(!rng) return false;
  const prev=prevSession(tid,name,dateISO,excludeId); if(!prev||!prev.length) return false;
  const real=prev.filter(s=>String(s.weight).trim()!==""||String(s.reps).trim()!=="");
  if(!real.length) return false;
  return real.every(s=>num(s.reps)>=rng.hi);
}
function allExerciseNames(){
  const map={};
  state.workouts.forEach(w=>w.exercises.forEach(e=>{ const k=norm(e.name); if(k&&!map[k]) map[k]=e.name.trim(); }));
  return Object.keys(map).map(k=>map[k]).sort((a,b)=>a.localeCompare(b,"ru"));
}
function exerciseSessions(name){
  const nm=norm(name); let arr=[];
  state.workouts.forEach(w=>{ const ex=w.exercises.find(e=>norm(e.name)===nm); if(!ex) return;
    let top=0,topReps=0,vol=0;
    ex.sets.forEach(s=>{ const ww=num(s.weight),rr=num(s.reps); vol+=ww*rr; if(ww>top){top=ww;topReps=rr;} });
    arr.push({id:w.id,date:w.date,created:w.created||0,top,topReps,vol}); });
  arr.sort((a,b)=> a.date<b.date?-1:a.date>b.date?1:(a.created-b.created));
  let best=-Infinity; arr.forEach(x=>{ x.isPR = best>-Infinity && x.top>best && x.top>0; if(x.top>best) best=x.top; });
  return arr;
}
function isPRset(weight,top,priorBestW){ const w=num(weight); return w>0 && w===top && priorBestW>-Infinity && top>priorBestW; }

/* ---------- navigation (with browser history for Android Back) ---------- */
function stateOf(){ return {view:route.view, opts:(route.view==="detail"?{id:route.id,from:route.from}:route.view==="tpl"?{dayId:route.dayId}:null)}; }
function safePush(st){ try{ history.pushState(st,""); }catch(e){} }
function safeReplace(st){ try{ history.replaceState(st,""); }catch(e){} }
function navigate(view,opts,push){
  route={view, ...(opts||{})};
  render();
  const v=document.getElementById("view"); if(v) v.scrollTop=0;
  if(push) safePush({view, opts:opts||null});
}
function go(view,opts){ navigate(view,opts,true); }
function navigateReplace(view,opts){ route={view, ...(opts||{})}; render(); const v=document.getElementById("view"); if(v) v.scrollTop=0; safeReplace({view, opts:opts||null}); }
function goTab(tab){ activeTab=tab; draft=null; go(tab); }
function histBack(){ try{ history.back(); }catch(e){ activeTab="home"; navigate("home",null,false); } }
function draftDirty(){ return !!draft && draftTouched; }
function timerHidden(){ return document.getElementById("timer").classList.contains("hidden"); }
function sheetHidden(){ return document.getElementById("overlay").classList.contains("hidden"); }
function applyState(st){
  st=st||{view:"home"}; const v=st.view||"home";
  if(v==="editor"){ draft=null; activeTab="home"; navigate("home",null,false); return; } // draft can't be restored
  if(v==="detail"){ draft=null; navigate("detail", st.opts||{}, false); return; }
  if(v==="tpl"){ draft=null; navigate("tpl", st.opts||{}, false); return; }
  draft=null; activeTab=v; navigate(v,null,false);
}
function onPop(ev){
  // close open layers first (so hardware Back dismisses them instead of leaving the page)
  if(!timerHidden()){ safePush(stateOf()); closeTimer(); return; }
  if(!sheetHidden()){ safePush(stateOf()); closeSheet(); return; }
  if(route.view==="editor" && !allowLeave && draftDirty()){
    safePush({view:"editor",opts:null}); // cancel this Back
    confirmDialog("Выйти без сохранения?","Изменения этой тренировки не сохранятся.","Выйти",true,function(){
      clearDraftSnapshot(); allowLeave=true; histBack();
    });
    return;
  }
  allowLeave=false;
  applyState(ev.state);
}

function blockPhase(){
  const bs=state.settings.blockStart;
  if(!isISO(bs)) return null;
  const d=Math.floor((parseISO(todayISO())-parseISO(bs))/86400000);
  if(d<0) return null;
  const wk=Math.floor(d/7), w=(wk%4)+1, block=Math.floor(wk/4)+1;
  let sets,rir,note="";
  if(w<=2){ sets="2 рабочих подхода"; rir="запас ~3 (RIR 3)"; }
  else if(w===3){ sets="3 рабочих подхода"; rir="запас 1–2 (RIR 1–2)"; }
  else { sets="Разгрузка: 2 подхода"; rir="вес −40–50%, без прогрессии"; note="Включи переключатель «разгрузка» на тренировках."; }
  return {w:w,block:block,start:bs,sets:sets,rir:rir,note:note};
}
function phaseBanner(){
  const p=blockPhase();
  const icon='<svg class="pi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4v16h16"/><path d="M7 14l3-4 3 3 4-6"/></svg>';
  if(!p) return '<div class="phase">'+icon+'<div><b>Отметь начало блока</b><div class="ph-sub">Тогда приложение будет подсказывать неделю блока, число подходов и запас сил. <button class="ph-link" onclick="App.setBlockStart()">начать блок сегодня</button></div></div></div>';
  return '<div class="phase">'+icon+'<div><b>Блок '+p.block+' \u00b7 Неделя '+p.w+' из 4</b>'+
    '<div class="ph-sub">'+p.sets+' \u00b7 '+p.rir+'.'+(p.note?(' '+p.note):'')+'</div>'+
    '<div class="ph-sub" style="margin-top:5px">Начало: '+fmtDMY(p.start)+' \u00b7 недели идут по календарю \u00b7 <button class="ph-link" onclick="App.setBlockStart()">новый блок с сегодня</button></div>'+
    '</div></div>';
}
function setBlockStart(){ confirmDialog("Новый блок с сегодня?","Отсчёт недель блока начнётся с сегодняшней даты.","Начать",false,function(){ state.settings.blockStart=todayISO(); persist(); render(); toast("Блок начат"); }); }
function yesterdayISO(){ const d=new Date(Date.now()-86400000); return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
function symptomNudge(){
  if(!state.workouts.length) return "";
  const y=yesterdayISO();
  if(!state.workouts.some(function(w){ return w.date===y; })) return "";
  const t=todayISO();
  if(state.symptoms.some(function(x){ return x.date===t; })) return "";

}

function tplAddExercise(){ const list=curTplList(); list.push({name:"",type:"wr",target:"",rest:0,note:""}); tplOpen[list.length-1]=true; persist(); render(); }
function tplRemoveExercise(i){ const list=curTplList(); const t=list[i]; if(!t) return;
  const doIt=function(){ list.splice(i,1); tplOpen={}; persist(); render(); toast("Удалено из программы"); };

function tplMoveDown(i){ const list=curTplList(); if(i>=list.length-1) return; const tmp=list[i+1]; list[i+1]=list[i]; list[i]=tmp; persist(); render(); }
function tplOnName(i,v){ const list=curTplList(); if(!list[i]) return;

function tplOnTarget(i,v){ const list=curTplList(); if(list[i]) list[i].target=v; persist(); }
function tplOnRest(i,v){ const list=curTplList(); if(list[i]) list[i].rest=Math.max(0,Math.round(num(v))); persist(); }

function renderDetail(id){
  const w=state.workouts.find(x=>x.id===id);
  if(!w) return empty(ICON.history,"Тренировка не найдена.");
  let h='<div class="det-meta">'+fmtWeekFull(w.date)+(w.deload?'<span class="tag-deload">разгрузка</span>':'')+'</div>';
  if(w.note) h+='<div class="det-note">'+esc(w.note)+'</div>';
  w.exercises.forEach((e,ei)=>{
    var ty=exType(e);
    const pb=priorBest(e.name,w.date,w.id);
    let top=0; e.sets.forEach(s=>{ const x=num(s.weight); if(x>top) top=x; });
    let sets="";
    e.sets.forEach((s,i)=>{
      let dv,pr=false;
      if(ty==="time"){ dv=fmt(s.sec)+' сек'; }
      else if(ty==="reps"){ dv=fmt(s.reps)+' повт'; }
      else { dv=fmt(s.weight)+' кг × '+fmt(s.reps); pr=(!w.deload)&&isPRset(s.weight,top,pb); }
      sets+='<div class="det-set"><span class="dn">'+(i+1)+'</span><span class="dv">'+dv+'</span>'+(pr?'<span class="pr-badge"><span class="flame">'+ICON.flame+'</span>рекорд</span>':'')+'</div>';
    });
    let tl,tv;
    if(ty==="time"){ let t=0; e.sets.forEach(s=>t+=num(s.sec)); tl='суммарно'; tv=t>0?(fmt(t)+' сек'):'—'; }
    else if(ty==="reps"){ let r=0; e.sets.forEach(s=>r+=num(s.reps)); tl='суммарно'; tv=r>0?(fmt(r)+' повт'):'—'; }
    else { let evol=0; e.sets.forEach(s=>evol+=num(s.weight)*num(s.reps)); tl='объём'; tv=fmtVol(evol); }
    h+='<div class="det-ex"><div class="det-ex-head"><h4>'+esc(e.name||"(без названия)")+'</h4><button class="hbtn" aria-label="Как делать" onclick="App.howtoFor(\''+w.id+'\','+ei+')">'+ICON.help+'</button></div>'+sets+(e.rir?'<div style="font-size:12.5px;color:var(--text-dim);margin-top:6px">Запас сил: <b style="color:var(--text)">'+e.rir+'</b></div>':'')+
        (e.note?'<div class="det-exnote">'+esc(e.note)+'</div>':'')+
        '<div class="det-total"><span>'+tl+'</span><b>'+tv+'</b></div></div>';
  });
  h+='<div class="det-total" style="border:none;margin-top:4px;font-size:15px"><span>Объём за тренировку</span><b style="font-size:16px">'+fmtVol(workoutVol(w))+'</b></div>';
  if(w.cardio) h+='<div class="det-note" style="margin-top:12px">Кардио: '+esc(w.cardio.type||"—")+(w.cardio.min?(' · '+w.cardio.min+' мин'):"")+(w.cardio.hr?(' · пульс '+w.cardio.hr):"")+'</div>';
  h+='<div class="detail-actions">'+
       '<button class="btn btn-ghost btn-sm" onclick="App.repeatWorkout(\''+w.id+'\')">'+ICON.copy+'Повторить</button>'+
       '<button class="btn btn-ghost btn-sm" onclick="App.editWorkout(\''+w.id+'\')">'+ICON.edit+'Изменить</button>'+
       '<button class="btn btn-ghost btn-sm danger-btn" onclick="App.deleteWorkout(\''+w.id+'\')">'+ICON.trash+'Удалить</button>'+
     '</div>';
  return h;
}

function exerciseCard(e,i){
  const open=!!e.open, ty=exType(e);
  const isF=function(s){ return ty==="time"?String(s.sec).trim()!=="" : ty==="reps"?String(s.reps).trim()!=="" : (String(s.weight).trim()!==""||String(s.reps).trim()!==""); };
  const filled=e.sets.filter(isF);
  let sub="";
  if(filled.length){
    const parts=filled.map(s=> ty==="time"?((fmtEdit(s.sec)||"0")+"с") : ty==="reps"?(fmtEdit(s.reps)||"0") : ((fmtEdit(s.weight)||"0")+"×"+(fmtEdit(s.reps)||"0")));
    sub='<div class="ex-ts mono">'+parts.slice(0,3).join("   ")+(filled.length>3?"  …":"")+'</div>';
  } else if(e.target||e.rest){ sub='<div class="ex-ts">Цель: '+esc(e.target||"—")+(e.rest?(" · "+e.rest+" с"):"")+'</div>'; }
  if(!open){
    return '<div class="ex-card collapsed" id="exCard-'+i+'">'+
      '<div class="ex-bar" role="button" tabindex="0" aria-label="Развернуть упражнение" onclick="App.toggleExercise('+i+')" onkeydown="App.cardKey(event)">'+
        '<span class="exchev">'+ICON.fwd+'</span>'+
        '<div class="ex-title"><div class="ex-tn'+(e.name?'':' ph')+'">'+(e.name?esc(e.name):'Упражнение')+'</div>'+sub+'</div>'+
        '<button class="hbtn" aria-label="Как делать" onclick="event.stopPropagation();App.howto('+i+')">'+ICON.help+'</button>'+
      '</div></div>';
  }
  const ghost=prevSession(draft.templateId,e.name,draft.date,draft.id);
  const pb=priorBest(e.name,draft.date,draft.id);
  let top=0; e.sets.forEach(s=>{ const x=num(s.weight); if(x>top) top=x; });
  let rows="";
  e.sets.forEach((s,j)=>{
    const g=ghost&&ghost[j];
    let main,gtxt="",pr=false;
    if(ty==="time"||ty==="reps"){
      const field=ty==="time"?"sec":"reps", unit=ty==="time"?"сек":"повт", val=ty==="time"?s.sec:s.reps;
      main='<div class="set-main one"><div class="si">'+(j+1)+'</div>'+
        '<div class="num-wrap"><input class="sin" type="text" inputmode="numeric" value="'+esc(fmtEdit(val))+'" placeholder="0" aria-label="Значение, подход '+(j+1)+'" oninput="App.onSet('+i+','+j+',\''+field+'\',this.value)"><span class="unit">'+unit+'</span></div>'+
        '<button class="icon-btn" aria-label="Убрать подход" onclick="App.removeSet('+i+','+j+')">'+ICON.trash+'</button></div>';
      if(g) gtxt="прошлый: "+fmt(ty==="time"?g.sec:g.reps)+(ty==="time"?"с":"");
    } else {
      pr=isPRset(s.weight,top,pb);
      main='<div class="set-main"><div class="si">'+(j+1)+'</div>'+
        '<div class="num-wrap"><input class="sin" type="text" inputmode="decimal" value="'+esc(fmtEdit(s.weight))+'" placeholder="0" aria-label="Вес, подход '+(j+1)+'" oninput="App.onSet('+i+','+j+',\'weight\',this.value)"><span class="unit">кг</span></div>'+
        '<div class="xsign">×</div>'+
        '<input class="sin" type="text" inputmode="numeric" value="'+esc(fmtEdit(s.reps))+'" placeholder="0" aria-label="Повторы, подход '+(j+1)+'" oninput="App.onSet('+i+','+j+',\'reps\',this.value)">'+
        '<button class="icon-btn" aria-label="Убрать подход" onclick="App.removeSet('+i+','+j+')">'+ICON.trash+'</button></div>';
      if(g) gtxt="прошлый: "+fmt(g.weight)+"×"+fmt(g.reps);
    }
    rows+='<div class="set-row">'+main+'<div class="set-sub">'+
        '<span class="ghost">'+gtxt+'</span>'+
        (ty==="wr"?('<span class="pr-badge" id="pr-'+i+'-'+j+'" '+(pr?"":'style="display:none"')+'><span class="flame">'+ICON.flame+'</span>рекорд</span>'):'')+
      '</div></div>';
  });
  return '<div class="ex-card" id="exCard-'+i+'">'+
      '<div class="ex-bar open">'+
        '<button class="exchev open" aria-label="Свернуть упражнение" onclick="App.toggleExercise('+i+')">'+ICON.fwd+'</button>'+
        '<input class="name-in" list="exNames" value="'+esc(e.name)+'" placeholder="Упражнение" aria-label="Название упражнения" onchange="App.onName('+i+',this.value)">'+
        '<button class="hbtn" aria-label="Как делать" onclick="App.howto('+i+')">'+ICON.help+'</button>'+
        '<button class="icon-btn danger" aria-label="Удалить упражнение" onclick="App.removeExercise('+i+')">'+ICON.trash+'</button>'+
      '</div>'+
      ((e.target||e.rest)?'':('<div class="ex-type-row"><span class="etl">Тип</span><div class="etseg">'+[["wr","вес×повт"],["reps","повторы"],["time","время"]].map(function(tp){ return '<button class="'+(ty===tp[0]?"on":"")+'" onclick="App.onExType('+i+',\''+tp[0]+'\')">'+tp[1]+'</button>'; }).join("")+'</div></div>'))+
      ((ty==="wr"&&!draft.deload&&progressionHint(draft.templateId,e.name,draft.date,draft.id,e.target))?('<div class="prog-hint">'+ICON.progress+'В прошлый раз — весь диапазон повторений. Можно добавить +2,5–5 кг.</div>'):'')+
      ((e.target||e.rest)?('<div class="ex-hint">Цель: '+esc(e.target||"—")+(e.rest?(' · отдых '+e.rest+' с <button class="ex-timer-link" onclick="App.openTimer('+e.rest+')">запустить</button>'):'')+'</div>'):'')+
      rows+
      '<button class="add-row" onclick="App.addSet('+i+')">'+ICON.plus+'Подход</button>'+
      ((ty==="time")?'':('<div class="rir"><span class="rl">Запас сил <button class="rq" aria-label="Что такое запас сил" onclick="App.rirInfo()">?</button></span><div class="rir-seg">'+[3,2,1].map(n=>'<button class="'+(e.rir===n?"on":"")+'" onclick="App.setRir('+i+','+n+')">'+n+'</button>').join("")+'</div></div>'))+
      '<div class="ex-note"><input type="text" value="'+esc(e.note||"")+'" placeholder="Заметка к упражнению (необязательно)" aria-label="Заметка к упражнению" oninput="App.onExNote('+i+',this.value)"></div>'+
    '</div>';
}
function draftVol(){ let v=0; draft.exercises.forEach(e=>e.sets.forEach(s=>{ v+=num(s.weight)*num(s.reps); })); return v; }
function refreshTotals(){ const el=document.getElementById("volTotal"); if(el) el.textContent=fmtVol(draftVol()); }
function refreshPR(i){
  const e=draft.exercises[i]; if(!e) return;
  const pb=priorBest(e.name,draft.date,draft.id);

/* ---------- chart (nice ticks + PR dots) ---------- */
function niceTicks(min,max){
  if(!isFinite(min)||!isFinite(max)){ min=0; max=1; }
  if(min===max){ min-=1; max+=1; }
  const span=max-min, raw=span/3, mag=Math.pow(10,Math.floor(Math.log10(raw)));
  const n=raw/mag; let step; if(n<1.5) step=1; else if(n<3) step=2; else if(n<7) step=5; else step=10; step*=mag;
  const lo=Math.floor(min/step)*step, hi=Math.ceil(max/step)*step, ticks=[];
  for(let v=lo; v<=hi+step*0.001; v+=step) ticks.push(Math.round(v*1000)/1000);
  return {min:lo,max:hi,ticks};
}
function chartSVG(points,fixed){
  const W=520,H=190,pl=44,pr=12,ptop=12,pbot=26;
  if(!points.length) return '<div style="padding:30px;text-align:center;color:var(--text-ghost);font-size:13px">нет данных</div>';
  const cw=W-pl-pr, ch=H-ptop-pbot;
  let t;
  if(fixed){ t={min:fixed.min,max:fixed.max,ticks:fixed.ticks}; }
  else { let dmin=Infinity,dmax=-Infinity; points.forEach(p=>{ if(p.value<dmin)dmin=p.value; if(p.value>dmax)dmax=p.value; }); t=niceTicks(dmin,dmax); }
  const x=i=> points.length===1? pl+cw/2 : pl+(cw*i/(points.length-1));
  const y=v=> ptop+ch*(1-(v-t.min)/(t.max-t.min));
  const acc="var(--accent)",line="var(--line)",dim="var(--text-ghost)",surf="var(--surface)";
  let g="";
  t.ticks.forEach(val=>{ const yy=y(val);
    g+='<line x1="'+pl+'" y1="'+yy.toFixed(1)+'" x2="'+(W-pr)+'" y2="'+yy.toFixed(1)+'" stroke="'+line+'" stroke-width="1"/>';
    g+='<text x="'+(pl-6)+'" y="'+(yy+4).toFixed(1)+'" text-anchor="end" font-size="11" fill="'+dim+'" font-family="ui-monospace,monospace">'+fmt(val)+'</text>';
  });
  if(points.length>1){ let d=""; points.forEach((p,i)=>{ d+=(i?"L":"M")+x(i).toFixed(1)+" "+y(p.value).toFixed(1)+" "; });
    g+='<path d="'+d+'" fill="none" stroke="'+acc+'" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>'; }
  points.forEach((p,i)=>{ const cx=x(i).toFixed(1),cy=y(p.value).toFixed(1);
    if(p.pr){ g+='<circle cx="'+cx+'" cy="'+cy+'" r="5.4" fill="'+surf+'" stroke="'+acc+'" stroke-width="2.4"/>'; }
    else { g+='<circle cx="'+cx+'" cy="'+cy+'" r="'+(points.length>40?2.2:3.4)+'" fill="'+acc+'"/>'; } });
  const idxs = points.length<=1?[0]: points.length<=3? points.map((_,i)=>i):[0,Math.floor((points.length-1)/2),points.length-1];
  idxs.forEach(i=>{ g+='<text x="'+x(i).toFixed(1)+'" y="'+(H-8)+'" text-anchor="middle" font-size="11" fill="'+dim+'" font-family="ui-monospace,monospace">'+points[i].label+'</text>'; });
  return '<svg class="chart" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet" role="img" aria-label="График">'+g+'</svg>';
}

function typeLabel(ty){ return ty==="time"?"время":ty==="reps"?"повторы":"вес×повторы"; }
function buildCSV(fromISO,toISO,all){
  const header=["Дата","День","Разгрузка","Тип","Упражнение","Подход","Вес (кг)","Повторы","Секунды","Объём (кг)","RIR","Кардио (мин)","Пульс","Заметка упражнения","Заметка тренировки"];
  const rows=[header.map(csvCell).join(";")];
  const list=state.workouts.slice().sort((a,b)=> a.date<b.date?-1:a.date>b.date?1:((a.created||0)-(b.created||0)));
  list.forEach(w=>{ if(!all){ if(w.date<fromISO||w.date>toISO) return; }
    const dl=w.deload?"да":"";
    w.exercises.forEach(e=>{
      var ty=exType(e);
      if(!e.sets.length){
        rows.push([fmtDMY(w.date),csvCell(w.templateName),dl,typeLabel(ty),csvCell(e.name),"","","","","",(e.rir||""),"","",csvCell(e.note||""),csvCell(w.note||"")].join(";"));
        return;
      }
      e.sets.forEach((s,i)=>{
        var wt="",rp="",sec="",vol="";
        if(ty==="wr"){ wt=csvNum(num(s.weight)); rp=Math.round(num(s.reps)); vol=csvNum(num(s.weight)*num(s.reps)); }
        else if(ty==="reps"){ rp=Math.round(num(s.reps)); }
        else { sec=Math.round(num(s.sec)); }
        rows.push([fmtDMY(w.date),csvCell(w.templateName),dl,typeLabel(ty),csvCell(e.name),i+1,wt,rp,sec,vol,(e.rir||""),"","",csvCell(e.note||""),csvCell(w.note||"")].join(";"));
      });
    });
    if(w.cardio){
      rows.push([fmtDMY(w.date),csvCell(w.templateName),dl,"кардио",csvCell(w.cardio.type||"Кардио"),"","","","","","",(w.cardio.min||""),(w.cardio.hr||""),"",csvCell(w.note||"")].join(";"));
    }
  });
  return "\uFEFF"+rows.join("\r\n");
}
function exportCSV(){
  if(!state.workouts.length){ toast("Нет тренировок для экспорта"); return; }
  const all=expMode!=="range";
  const from=document.getElementById("expFrom")?document.getElementById("expFrom").value:"";
  const to=document.getElementById("expTo")?document.getElementById("expTo").value:"";
  if(!all && (!isISO(from)||!isISO(to))){ toast("Укажите даты периода"); return; }
  const content=buildCSV(from,to,all);
  const name="trenirovki_"+(all?("vse_"+todayISO()):(from+"_"+to))+".csv";
  shareFile(name,content,"text/csv;charset=utf-8");
}
function exportBackup(){ state.settings.lastBackupAt=todayISO(); persist(); shareFile("gym-backup-"+todayISO()+".json",JSON.stringify(state),"application/json"); render(); }
function importClick(){ document.getElementById("importFile").click(); }
function onImportFile(input){
  const f=input.files&&input.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=function(){ let data; try{ data=JSON.parse(r.result); }catch(e){ toast("Файл повреждён"); input.value=""; return; }
    if(!isValidImport(data)){ toast("Это не похоже на копию"); input.value=""; return; }
    confirmDialog("Восстановить данные?","Текущие записи будут заменены данными из файла. Копия текущих данных сохранится на случай ошибки.","Восстановить",true,function(){
      try{ localStorage.setItem(PREV_KEY, JSON.stringify(state)); }catch(e){}
      state=normalizeState(data); persist(); applyTheme(); activeTab="home"; navigateReplace("home"); toast("Данные восстановлены");
    });
    input.value="";
  };
  r.readAsText(f);
}
async function shareFile(filename,content,mime){
  try{
    const blob=new Blob([content],{type:mime}); const file=new File([blob],filename,{type:mime});
    if(navigator.canShare && navigator.canShare({files:[file]})){ try{ await navigator.share({files:[file],title:filename}); return; }catch(e){ if(e&&e.name==="AbortError") return; } }
    const url=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download=filename; document.body.appendChild(a); a.click();
    setTimeout(function(){ URL.revokeObjectURL(url); a.remove(); },200); toast("Файл сохранён");
  }catch(e){ toast("Не удалось сохранить файл"); }
}
function clearAll(){
  confirmDialog("Удалить все данные?","Все тренировки, дни и измерения будут стёрты. Это нельзя отменить. Сначала лучше сохранить копию.","Удалить всё",true,function(){
    try{ localStorage.setItem(PREV_KEY, JSON.stringify(state)); }catch(e){}
    state=defaults(); persist(); applyTheme(); activeTab="home"; navigateReplace("home"); toast("Все данные удалены");
  });
}

/* ---------- dialogs ---------- */
function lockScroll(on){ const v=document.getElementById("view"); if(v) v.style.overflow=on?"hidden":""; }
function openSheet(html){ const o=document.getElementById("overlay"); o.innerHTML='<div class="sheet" role="dialog" aria-modal="true">'+html+'</div>'; o.classList.remove("hidden"); lockScroll(true);
  o.onclick=function(e){ if(e.target===o) closeSheet(); };
  setTimeout(function(){ const el=o.querySelector("input,button"); if(el) el.focus(); },40); }
function closeSheet(){ const o=document.getElementById("overlay"); o.classList.add("hidden"); o.innerHTML=""; if(timerHidden()) lockScroll(false); }
let cbConfirm=null,cbPrompt=null;
function confirmDialog(title,msg,okLabel,danger,cb){ cbConfirm=cb;
  openSheet('<h3>'+esc(title)+'</h3><p>'+esc(msg)+'</p><div class="sheet-actions">'+
    '<button class="btn '+(danger?"btn-ghost danger-btn":"btn-primary")+' btn-block" onclick="App._confirmOk()">'+esc(okLabel)+'</button>'+
    '<button class="btn btn-ghost btn-block" onclick="App.closeSheet()">Отмена</button></div>'); }
function _confirmOk(){ const cb=cbConfirm; cbConfirm=null; closeSheet(); if(cb) cb(); }
function promptDialog(title,label,value,cb){ cbPrompt=cb;
  openSheet('<h3>'+esc(title)+'</h3><div class="field" style="margin:10px 0 4px"><div class="field-label">'+esc(label)+'</div><input class="fin" id="promptInput" value="'+esc(value)+'"></div>'+
    '<div class="sheet-actions"><button class="btn btn-primary btn-block" onclick="App._promptOk()">Готово</button><button class="btn btn-ghost btn-block" onclick="App.closeSheet()">Отмена</button></div>');
  setTimeout(function(){ const el=document.getElementById("promptInput"); if(el){ el.focus(); el.select(); } },60); }
function _promptOk(){ const el=document.getElementById("promptInput"); const val=el?el.value:""; const cb=cbPrompt; cbPrompt=null; closeSheet(); if(cb) cb(val); }

/* ---------- rest timer (timestamp-based) ---------- */
let tState={endTime:0,remaining:0,total:0,running:false,iv:null,ctx:null,fired:false};
function openTimer(sec){ const s0=(typeof sec==="number"&&sec>0)?sec:state.settings.rest; tState.total=s0; tState.remaining=s0; tState.running=false; tState.fired=false;
  document.getElementById("timer").classList.remove("hidden"); lockScroll(true); renderTimer(); startTimer(); }
function renderTimer(){
  const m=Math.floor(tState.remaining/60),s=tState.remaining%60,done=tState.remaining<=0;
  document.getElementById("timer").innerHTML='<div class="timer-overlay"><div class="timer-box">'+
    '<div class="timer-time'+(done?" done":"")+'">'+m+":"+pad(s)+'</div>'+
    '<div class="timer-label">'+(done?"Готово!":(tState.running?"идёт отдых":"пауза"))+'</div>'+
    '<div class="timer-row"><button class="btn" onclick="App.timerAdd(-15)">−15</button>'+
      '<button class="btn primary" onclick="App.timerToggle()">'+(tState.running?"Пауза":(done?"Заново":"Старт"))+'</button>'+
      '<button class="btn" onclick="App.timerAdd(15)">+15</button></div>'+
    '<div class="timer-note">звук сработает, пока приложение открыто</div>'+
    '<button class="timer-close" onclick="App.closeTimer()">Закрыть</button></div></div>';
}
function recompute(){ tState.remaining=Math.max(0,Math.round((tState.endTime-Date.now())/1000)); }
function startTimer(){ if(tState.running) return; if(tState.remaining<=0){ tState.remaining=tState.total; tState.fired=false; }
  tState.endTime=Date.now()+tState.remaining*1000;
  try{ if(!tState.ctx) tState.ctx=new (window.AudioContext||window.webkitAudioContext)(); if(tState.ctx.state==="suspended") tState.ctx.resume(); }catch(e){}
  tState.running=true; tState.iv=setInterval(tick,250); renderTimer(); }
function tick(){ recompute(); if(tState.remaining<=0){ tState.remaining=0; tState.running=false; clearInterval(tState.iv); if(!tState.fired){ tState.fired=true; beep(); vibrate(); } } renderTimer(); }
function timerToggle(){ if(tState.running){ recompute(); tState.running=false; clearInterval(tState.iv); renderTimer(); } else startTimer(); }
function timerAdd(d){ if(tState.running){ recompute(); tState.endTime=Math.max(Date.now(),tState.endTime+d*1000); recompute(); } else { tState.remaining=Math.max(0,tState.remaining+d); } if(tState.remaining>0) tState.fired=false; renderTimer(); }
function closeTimer(){ tState.running=false; clearInterval(tState.iv); document.getElementById("timer").classList.add("hidden"); document.getElementById("timer").innerHTML=""; if(sheetHidden()) lockScroll(false); }
function onVisible(){ if(timerHidden()||!tState.running) return; recompute(); if(tState.remaining<=0){ tState.remaining=0; tState.running=false; clearInterval(tState.iv); if(!tState.fired){ tState.fired=true; beep(); vibrate(); } } renderTimer(); }
function beep(){ try{ const c=tState.ctx||new (window.AudioContext||window.webkitAudioContext)(); tState.ctx=c;
  [0,0.28,0.56].forEach(function(t){ const o=c.createOscillator(),g=c.createGain(); o.connect(g); g.connect(c.destination); o.type="sine"; o.frequency.value=880;
    g.gain.setValueAtTime(0.0001,c.currentTime+t); g.gain.exponentialRampToValueAtTime(0.25,c.currentTime+t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+t+0.2);
    o.start(c.currentTime+t); o.stop(c.currentTime+t+0.22); }); }catch(e){} }
function vibrate(){ try{ if(navigator.vibrate) navigator.vibrate([200,80,200]); }catch(e){} }

/* ---------- toast ---------- */
let toastTimer=null;
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.remove("hidden"); t.classList.add("show"); clearTimeout(toastTimer); toastTimer=setTimeout(function(){ t.classList.add("hidden"); t.classList.remove("show"); },2200); }

/* ---------- misc ---------- */
function openDetail(id,from){ go("detail",{id:id,from:from||"history"}); }
function cardKey(e){ if(e.target!==e.currentTarget) return; if(e.key==="Enter"||e.key===" "){ e.preventDefault(); e.currentTarget.click(); } }

/* ---------- init ---------- */
function persistDraft(){ if(!draft) return; try{ localStorage.setItem(DRAFT_KEY, JSON.stringify({v:1,at:Date.now(),draft:draft})); }catch(e){} }
function clearDraftSnapshot(){ try{ localStorage.removeItem(DRAFT_KEY); }catch(e){} }
function readDraftSnapshot(){
  try{
    const raw=localStorage.getItem(DRAFT_KEY); if(!raw) return null;
    const d=JSON.parse(raw);
    if(!d||typeof d!=="object"||!d.draft||typeof d.draft!=="object") return null;
    if(!Array.isArray(d.draft.exercises)) return null;
    if(!isISO(d.draft.date)) return null;
    return d;
  }catch(e){ return null; }
}
function restoreDraftIfAny(){
  const snap=readDraftSnapshot(); if(!snap) return;
  const nm=snap.draft.templateName||"Тренировка";
  openSheet('<div class="grip-x"></div><h3>Незаконченная тренировка</h3>'+
    '<p>Есть несохранённый черновик: <b>'+esc(nm)+'</b> от '+fmtFull(snap.draft.date)+'. Продолжить с того места?</p>'+
    '<div class="sheet-actions">'+
      '<button class="btn btn-primary btn-block" onclick="App.resumeDraft()">Продолжить</button>'+
      '<button class="btn btn-ghost btn-block" onclick="App.dropDraft()">Удалить черновик</button>'+
    '</div>');
}
function resumeDraft(){
  const snap=readDraftSnapshot(); if(!snap){ closeSheet(); return; }
  closeSheet(); draft=snap.draft; draftTouched=true; persistDraft(); allowLeave=false; go("editor");
}
function dropDraft(){ clearDraftSnapshot(); closeSheet(); toast("Черновик удалён"); }
function helpSheet(){
  openSheet('<div class="grip-x"></div><h3>Как пользоваться</h3><ul class="ht-cues" style="margin-top:4px">'+
    '<li>На главной жми <b>«Начать тренировку»</b> — упражнения дня уже вписаны по программе тренера.</li>'+
    '<li>Серым под подходом (<span class="ghost">прошлый: 100×10</span>) — твоя прошлая тренировка: сразу видно, что улучшать.</li>'+
    '<li>Кнопка <b>«?»</b> у упражнения — схема и техника. Значок <span class="flame" style="vertical-align:-2px">'+ICON.flame+'</span> — новый рекорд веса.</li>'+
    '<li>Таймер отдыха: кнопка <b>«Отдых»</b> внизу или «запустить» прямо у упражнения.</li>'+
    '<li>Значок списка на карточке дня — изменить набор упражнений насовсем (например, заменить тренажёр).</li>'+
    '<li>Данные живут только на этом телефоне. Раз в пару недель сохраняй копию: <b>«Ещё» → Резервная копия</b>.</li>'+
  '</ul><div style="font-size:12px;color:var(--text-dim);margin-top:10px">Эта справка всегда доступна: «Ещё» → «Как пользоваться».</div>'+
  '<button class="btn btn-primary btn-block" style="margin-top:14px" onclick="App.closeSheet()">Понятно</button>');
}
function init(){
  storageOK=storageAvailable();
  applyTheme();
  try{ matchMedia("(prefers-color-scheme: dark)").addEventListener("change",function(){ if(state.settings.theme==="auto") applyTheme(); }); }catch(e){}
  try{ document.getElementById("importFile").addEventListener("change",function(){ onImportFile(this); }); }catch(e){}
  try{ window.addEventListener("popstate",onPop); }catch(e){}
  try{ document.addEventListener("visibilitychange",function(){ if(document.hidden){ persistDraft(); } else onVisible(); }); }catch(e){}
  try{ document.addEventListener("keydown",function(e){ if(e.key==="Escape"){ if(!timerHidden()) closeTimer(); else if(!sheetHidden()) closeSheet(); } }); }catch(e){}
  navigate("home",null,false); safeReplace({view:"home",opts:null});
  restoreDraftIfAny();
  if(!readDraftSnapshot() && !state.settings.onboardShown){ state.settings.onboardShown=true; persist(); helpSheet(); }
}

return {
  init,go,goTab,histBack,cardKey,openDetail,
  startWorkout,beginBlank,beginFrom,repeatWorkout,editWorkout,deleteWorkout,saveDraft,resumeDraft,dropDraft,
  addDay,renameDay,deleteDay,
  onDateChange,onWorkoutNote,onExNote,onCardio,onName,onSet,addSet,removeSet,addExercise,removeExercise,toggleExercise,
  setProgressMode,selectExercise,addBodyweight,deleteBodyweight,addSymptom,deleteSymptom,
  setTheme,setRest,exportCSV,exportBackup,importClick,onImportFile,clearAll,
  howto,howtoFor,onExType,setRir,rirInfo,onDeload,deloadInfo,setBlockStart,openSheet,closeSheet,confirmDialog,promptDialog,_confirmOk,_promptOk,
  openTplEditor,tplToggle,tplAddExercise,tplRemoveExercise,tplMoveUp,tplMoveDown,tplOnName,tplOnType,tplOnTarget,tplOnRest,tplOnNote,tplRestoreDefaults,setExpMode,setExChartMode,goSymptoms,helpSheet,
  openTimer,closeTimer,timerToggle,timerAdd
};
})();
